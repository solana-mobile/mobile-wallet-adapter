name: Build React Native Example Apps

on:
  push:
    branches: [ main ]
    paths: [ '.github/**', 'examples/example-react-native-*/**', 'js/**' ]
  pull_request:
    branches: [ main ]
    paths: [ '.github/**', 'examples/example-react-native-*/**', 'js/**' ]
  release:
    types: [ published ]

jobs:
  build:
    name: ${{ matrix.example }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - directory: 'examples/example-react-native-app/'
            example: 'Example App'
          - directory: 'examples/example-react-native-wallet/'
            example: 'Example Wallet'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          cache: true
          cache_dependency_path: 'examples/example-react-native-*/pnpm-lock.yaml'
          package_json_file: 'js/package.json'

      - name: set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: 'Build Project'
        working-directory: 'js/'
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: '[${{ matrix.example }}] Install dependencies'
        working-directory: ${{ matrix.directory }}
        run: pnpm install --frozen-lockfile
      - name: '[${{ matrix.example }}] Format Check'
        working-directory: ${{ matrix.directory }}
        run: pnpm format:check
      - name: '[${{ matrix.example }}] Lint'
        working-directory: ${{ matrix.directory }}
        run: pnpm lint:check
      - name: '[${{ matrix.example }}] Type Check'
        working-directory: ${{ matrix.directory }}
        run: npx tsc --noEmit
      - name: '[${{ matrix.example }}] Build'
        working-directory: ${{ matrix.directory }}
        run: pnpm android:build
