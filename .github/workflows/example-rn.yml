name: Build React Native Example Apps

on:
  push:
    branches: [ main ]
    paths: [ '.github/**', 'examples/example-react-native-*/**', 'js/**' ]
  pull_request:
    branches: [ main ]
    paths: [ '.github/**', 'examples/example-react-native-*/**', 'js/**' ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      
      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          cache: true
          cache_dependency_path: 'examples/example-react-native-*/pnpm-lock.yaml'
          package_json_file: 'js/package.json'

      - name: set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: 'Build Project'
        working-directory: 'js/'
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: '[Example App] Install dependencies'
        working-directory: 'examples/example-react-native-app/'
        run: pnpm install --frozen-lockfile
      - name: '[Example App] Format Check'
        working-directory: 'examples/example-react-native-app/'
        run: pnpm format:check
      - name: '[Example App] Lint'
        working-directory: 'examples/example-react-native-app/'
        run: pnpm lint:check
      - name: '[Example App] Type Check'
        working-directory: 'examples/example-react-native-app/'
        run: npx tsc --noEmit
      - name: '[Example App] Build'
        working-directory: 'examples/example-react-native-app/'
        run: pnpm android:build

      - name: '[Example Wallet] Install dependencies'
        working-directory: 'examples/example-react-native-wallet/'
        run: pnpm install --frozen-lockfile
      - name: '[Example Wallet] Format Check'
        working-directory: 'examples/example-react-native-wallet/'
        run: pnpm format:check
      - name: '[Example Wallet] Lint'
        working-directory: 'examples/example-react-native-wallet/'
        run: pnpm lint:check
      - name: '[Example Wallet] Type Check'
        working-directory: 'examples/example-react-native-wallet/'
        run: npx tsc --noEmit
      - name: '[Example Wallet] Build'
        working-directory: 'examples/example-react-native-wallet/'
        run: pnpm android:build
