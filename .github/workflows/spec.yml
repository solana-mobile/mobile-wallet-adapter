name: Generate mobile-wallet-adapter specification

on:
  push:
    branches: [ main ]
    paths: [ '.github/**', 'spec/**' ]
  pull_request:
    branches: [ main ]
    paths: [ '.github/**', 'spec/**' ]

defaults:
  run:
    working-directory: spec

jobs:
  generate-spec:
    runs-on: ubuntu-latest

    env:
      BUNDLE_WITHOUT: 'development'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: set up PlantUML
        run: ./setup-plantuml.sh
        working-directory: .github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: spec

      - name: Generate jekyll site
        run: bundle exec jekyll build
        working-directory: spec

      # Upload spec jekyll site to workflow artifacts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spec-jekyll-site
          path: spec/_site/*
          if-no-files-found: error
          retention-days: 1

  publish-to-gh-pages:
    runs-on: ubuntu-latest
    needs: generate-spec
    concurrency: publish-to-gh-pages
    if: ${{ github.event_name == 'push' && !github.event.repository.fork }}

    steps:
      - name: Update spec jekyll site
        uses: solana-mobile/gha-commit-artifact-to-branch@4d6e4715d4d7eb83771e2e9d88bc11087c697682 # v2
        with:
          token: ${{ secrets.UPDATE_GITHUB_PAGES_TOKEN }}
          branch: gh-pages
          artifact-name: spec-jekyll-site
          dest: spec
          commit-message: 'Update spec jekyll site'
