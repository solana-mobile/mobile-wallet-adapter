name: Generate mobile-wallet-adapter specification

on:
  push:
    branches: [ main ]
    paths: [ '.github/**', 'spec/**' ]
  pull_request:
    branches: [ main ]
    paths: [ '.github/**', 'spec/**' ]

defaults:
  run:
    working-directory: spec

jobs:
  generate-spec:
    runs-on: ubuntu-latest

    env:
      BUNDLE_WITHOUT: 'development'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: set up PlantUML
        run: ./setup-plantuml.sh
        working-directory: .github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: set up Ruby
        uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1.321.0
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: spec

      - name: Generate jekyll site
        run: bundle exec jekyll build
        working-directory: spec

      # Upload spec jekyll site to workflow artifacts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spec-jekyll-site
          path: spec/_site/*
          if-no-files-found: error
          retention-days: 1

  publish-to-gh-pages:
    runs-on: ubuntu-latest
    needs: generate-spec
    concurrency: publish-to-gh-pages
    if: ${{ github.event_name == 'push' && !github.event.repository.fork }}

    steps:
      - name: Update spec jekyll site
        uses: solana-mobile/gha-commit-artifact-to-branch@4d6e4715d4d7eb83771e2e9d88bc11087c697682 # v2
        with:
          token: ${{ secrets.UPDATE_GITHUB_PAGES_TOKEN }}
          branch: gh-pages
          artifact-name: spec-jekyll-site
          dest: spec
          commit-message: 'Update spec jekyll site'
