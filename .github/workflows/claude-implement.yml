name: Claude Implement

# Maintainer-invoked implementation built on anthropics/claude-code-action. A
# maintainer comments `@claude implement` on an issue that already has a plan
# from `@claude investigate`; Claude implements that plan on a NEW branch and
# opens a pull request linked to the issue. It never pushes to `main` (it works
# on a feature branch and opens a PR), and `main` branch protection requires a
# human review + merge regardless.
#
# Gated to org members/collaborators only.
#
# IMPORTANT CI CAVEAT: pull requests created with the default GITHUB_TOKEN do
# NOT trigger other workflows (GitHub's anti-recursion rule), so the repo's CI
# will not run automatically on the bot's PR. To get CI to run on these PRs,
# give this workflow a non-default token (a fine-grained PAT or a GitHub App
# token) via the `github_token` input AND the checkout step, or have a
# maintainer push an empty commit / reopen the PR to kick CI. Until then, treat
# the bot's PR as "needs a human to trigger CI before review".

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: claude-implement-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: >
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude implement') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            A maintainer asked you to implement a fix for issue
            #${{ github.event.issue.number }} in `${{ github.repository }}` (the
            Solana Mobile Wallet Adapter SDK monorepo) by commenting
            `@claude implement`. Read the triggering comment for any extra
            instructions.

            ## Use the existing plan
            First, fetch the most recent investigation plan (it carries the
            hidden marker `claude-plan`):
              `gh api "repos/${GH_REPO}/issues/${ISSUE_NUMBER}/comments" --jq '[.[]|select(.body|contains("claude-plan"))]|last|.body'`
            - If a plan exists, implement THAT plan.
            - If no plan exists, read the issue and the code, decide on a
              minimal, well-scoped fix yourself, and proceed. Do not gold-plate.

            ## Implement on a new branch and open a PR (never touch main)
            1. Configure git identity:
               `git config user.name "claude-implement[bot]"` and
               `git config user.email "claude-implement@users.noreply.github.com"`.
            2. Create a new branch: `git switch -c claude/issue-${ISSUE_NUMBER}-fix`
               (if it exists, add a short suffix).
            3. Make the code changes. This is a monorepo — Android (Java) under
               android/, JS/TS packages under js/packages/*, examples under
               examples/. Match the surrounding code style. Keep the diff
               focused on the fix described in the plan.
            4. Commit with a clear message referencing the issue, then push:
               `git push -u origin <branch>`.
            5. Open a PR against the default branch with `gh pr create`:
               - Title: concise summary of the fix.
               - Body: what changed and why, a "Fixes #${ISSUE_NUMBER}" line so
                 it auto-links and closes on merge, the test plan from the plan,
                 and a note that it was generated by the `@claude implement`
                 workflow and needs human review.
               - Label it `ai-authored` (create the label first if needed:
                 `gh label create "ai-authored" --color "5319e7" --description "Opened by the @claude implement workflow" --force`).
            6. Post a short comment on the issue linking the new PR, ending with
               the hidden marker on its own line:
                 <!-- claude-implement -->

            ## Guardrails
            - NEVER commit or push to `main`; only your feature branch + a PR.
            - Do not run heavy builds/test suites (cost/time) — CI validates the
              PR. You may run a quick, cheap type/lint check if trivially
              available, but don't block on it.
            - If the plan is ambiguous or the change would be large/architectural,
              STOP: post a comment on the issue explaining what's unclear and
              asking a maintainer to clarify, instead of guessing. Do not open a
              speculative PR.
          # Manual implementation path: Sonnet + medium effort. Turn UP with
          # --effort high if diffs come out sloppy.
          claude_args: |
            --model claude-sonnet-5
            --effort medium
            --max-turns 60
            --allowedTools "Read,Grep,Glob,Edit,Write,Bash(git:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh label:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh api:*)"
