name: Issue Triage

# LLM-driven triage built on anthropics/claude-code-action.
#
# One combined classification pass runs on issue open/edit and on new
# (non-bot) comments. It classifies product source, repro quality, template
# completeness and version staleness, then branches on a single verdict:
# labels + a grace-period comment for "waiting on reporter" states, or an
# immediate closing comment for wrong-repo / spam / version-fixed cases.
#
# State lives entirely in GitHub labels + a hidden HTML marker
# (<!-- claude-triage-verdict: ... -->) in the bot's own comment. No database.
# The deterministic nightly job in issue-triage-stale-sweep.yml uses that same
# marker to auto-close stale "waiting on reporter" issues after 7 days.
#
# Setup required by a maintainer (one time):
#   - Add the `ANTHROPIC_API_KEY` repository secret (or swap the auth input
#     below for the Claude GitHub App's CLAUDE_CODE_OAUTH_TOKEN).
#   - Fill in the KNOWN FIRST-PARTY PRODUCTS block in the prompt (app name,
#     package, support link) — see the TODO markers there.

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

# One triage run per issue at a time; a newer event supersedes an in-flight one
# so we never double-comment from a near-simultaneous edit + comment.
concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    # Hard wall-clock cap so a stuck run can't burn a runner (or tokens) forever.
    timeout-minutes: 10

    # Cost gate: a Claude run is expensive the instant it launches, so we decide
    # here — NOT inside the prompt — whether it's worth launching at all. Only
    # OPEN, non-PR issues, and only in these cases:
    #   - a newly OPENED bug (has needs-triage; feature/question templates don't,
    #     so they never launch a run);
    #   - an EDIT to an issue that is still in a triage/awaiting-reporter state;
    #   - a COMMENT BY THE ORIGINAL REPORTER on an issue we're waiting on
    #     (needs-*). Comments from bots, maintainers, or +1'ers do NOT re-triage,
    #     and comments on already-resolved issues do NOT re-triage.
    if: >
      github.event.issue.state == 'open' &&
      !github.event.issue.pull_request &&
      (
        (github.event_name == 'issues' && github.event.action == 'opened' &&
         contains(github.event.issue.labels.*.name, 'needs-triage'))
        ||
        (github.event_name == 'issues' && github.event.action == 'edited' &&
         (contains(github.event.issue.labels.*.name, 'needs-triage') ||
          contains(github.event.issue.labels.*.name, 'needs-info') ||
          contains(github.event.issue.labels.*.name, 'needs-test-app-repro') ||
          contains(github.event.issue.labels.*.name, 'needs-version-upgrade')))
        ||
        (github.event_name == 'issue_comment' &&
         github.event.comment.user.type != 'Bot' &&
         github.event.comment.user.login == github.event.issue.user.login &&
         (contains(github.event.issue.labels.*.name, 'needs-info') ||
          contains(github.event.issue.labels.*.name, 'needs-test-app-repro') ||
          contains(github.event.issue.labels.*.name, 'needs-version-upgrade')))
      )

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are the issue-triage bot for the `${{ github.repository }}`
            repository, the home of the Solana Mobile Wallet Adapter (MWA) SDK.
            You have been triggered by a `${{ github.event_name }}` event on
            issue #${{ github.event.issue.number }}. Do ONE combined
            classification pass and take exactly the follow-up actions your
            verdict calls for. Be conservative: a wrong "please clarify" costs
            one comment, but a wrong redirect-and-close throws away a real bug
            report.

            ## Gather context first
            - Read the full issue and every comment:
              `gh issue view ${{ github.event.issue.number }} --json title,body,author,labels,state,comments`
            - Check existing labels FIRST. The repo has separate intake
              templates: bugs arrive labelled `needs-triage`; feature requests
              arrive labelled `enhancement` (via feature_request.yml). If the
              issue already carries `enhancement` (or `question`), it was NOT
              filed as a bug — do not demand bug-report fields. Treat it as
              `not_a_bug`, make sure the right label is present, and only add a
              brief comment if there is no prior verdict comment yet; otherwise
              take no further action. Full bug triage below applies only to
              issues in the `needs-triage` (bug) intake.
            - The reporter filled out a structured Bug report form
              (.github/ISSUE_TEMPLATE/bug_report.yml) with these fields:
              description of the bug, affected SDK/platform, SDK version,
              dependency versions, wallets tested (at least Mock MWA + 1 other is
              required — MWA is always app-to-wallet, so even web/RN reports must
              name a wallet), "Is this reproducible using our example/test app?",
              steps to reproduce with the example app, expected vs actual
              behavior, and optional Android versions tested, screenshots, device
              details, logs, and additional context.

            ## This is a MULTI-PLATFORM monorepo — anchor on the platform
            The affected SDK/platform field is the master key: it selects the
            library, the version line, and the relevant example app. Everything
            below is platform-specific.
            - Android (native / Java): Maven `com.solanamobile:mobile-wallet-adapter-clientlib`
              (dApps) and `...-walletlib` (wallets); sources under android/.
            - Android (Kotlin): Maven `com.solanamobile:mobile-wallet-adapter-clientlib-ktx`.
            - Web (JS/TS) and React Native: the npm packages under js/packages/*
              (`@solana-mobile/mobile-wallet-adapter-protocol`, `-protocol-web3js`,
              `-protocol-kit`, `-walletlib`, `wallet-adapter-mobile`,
              `wallet-standard-mobile`) — EACH has its OWN independent version
              line, so only ever compare a version against the same package.
            Example/test apps by platform (use these to judge repro adequacy):
            Android (Java/Kotlin) -> android/fakedapp, android/fakewallet,
            examples/example-clientlib-ktx-app; React Native ->
            examples/example-react-native-app, examples/example-react-native-wallet;
            Web -> examples/example-web-app. A repro that names an example app
            from a DIFFERENT platform than the reported one is a red flag worth a
            clarifying question.

            ## KNOWN FIRST-PARTY PRODUCTS (out of scope for this repo)
            Treat this block as ground truth. These are Solana-Mobile-owned
            apps, NOT this SDK — issues about the app itself belong in our
            support channels, not here.
            <<<
            - "Seed Vault Wallet" — Solana Mobile's own wallet app, preinstalled
              and available ONLY on the Seeker phone (not on the Play Store or
              any other device). Support channel: our Discord,
              https://discord.gg/solanamobile.
            >>>
            IMPORTANT nuance — Seed Vault Wallet also appears as a choice in the
            form's "wallets tested" field, and that is legitimate: a reporter may
            use Seed Vault Wallet as the *counterparty wallet* while reproducing a
            genuine SDK bug from a dApp/example app. Only treat it as
            `wrong_repo_first_party` when the issue is ABOUT Seed Vault Wallet the
            app itself — its UI, its on-device behavior, "the wallet won't
            open/approve/sign", account/seed management, Seeker-specific behavior
            — with no SDK-level or example-app repro. When Seed Vault is merely
            the test wallet for an SDK-side bug, keep triaging it as an SDK issue.

            ## Classification order (follow strictly)

            1. PRODUCT SOURCE first. Decide whether the reporter is a developer
               integrating the SDK (they show integration code, e.g. calling
               `SdkClient.connect()`, wallet-adapter APIs, stack traces through
               MWA packages) or an end user of some app with no code visibility.
               - MWA is ALWAYS an app-to-wallet flow (dApp -> wallet). A very
                 common mis-report here is a web/React Native dApp team blaming
                 the SDK for what is really the WALLET's behavior. Separate the
                 two: is the fault in the SDK/protocol layer (association,
                 encoding, the client/wallet libraries in this repo) or in how a
                 specific wallet app handled the request? If it's wallet-side and
                 the wallet is Seed Vault Wallet -> `wrong_repo_first_party`; if
                 it's a third-party wallet (Phantom, Solflare, Backpack, etc.)
                 and there's no example/test-app repro -> `wrong_repo_third_party`.
               - Route to `wrong_repo_first_party` / `wrong_repo_third_party`
                 ONLY when there is no independent example/test-app repro AND the
                 reporter has no visibility into SDK-level behavior.
               - When signals are mixed, choose `ambiguous` and ask for
                 clarification (`needs_more_info`) rather than redirecting.

            2. VERSION STALENESS — only for a genuine `sdk_issue`, and always
               scoped to the reported platform + package. Use REAL semver
               ordering (1.10.0 > 1.9.0 — never string-sort), comparing only
               within the SAME package's version line.
               - Web / React Native (npm packages): identify the specific
                 `@solana-mobile/*` package, then read its changelog at
                 js/packages/<package-dir>/CHANGELOG.md (Changesets format:
                 `## X.Y.Z` headers with commit-hash-prefixed bullet lines). The
                 latest released version is the top `## X.Y.Z` header IN THAT
                 package's file. Do not compare across packages — protocol,
                 walletlib, protocol-kit, etc. are on different version lines.
               - Android (Java) / Kotlin (Maven): there is NO in-repo changelog
                 (android/gradle.properties is `main-SNAPSHOT`). The latest
                 released version comes from GitHub Releases / tags — use
                 `gh release list`, `gh release view <tag>`, and
                 `gh api "repos/${GH_REPO}/releases"`; you may also consult
                 `git log`/`git tag`. Cite a real release-note line or commit.
               - `behind_fix_confirmed` requires an ACTUAL quotable changelog /
                 release-note line or commit that plausibly matches the reported
                 bug. Never fabricate or guess a citation. If the reported
                 version is behind but you cannot find a matching fix, that is
                 `behind_no_match_found` — do NOT emit `fixed_in_later_version`.
               - If the platform is "Not sure / other" or the package can't be
                 pinned down, skip the version verdict and prefer
                 `needs_more_info` asking which package/version.

            3. TEMPLATE COMPLETENESS / REPRO QUALITY — only if not already
               routed away above. "Adequate" repro means SPECIFIC: it names an
               example app, a version, and numbered steps. Restating the bug or
               generic filler ("N/A", "yes", "just run it") is NOT adequate.
               Note the form cannot conditionally require fields, so someone who
               answered "No - only seen in my own app" was still forced to type
               something into the repro-steps box — filler there is exactly what
               you must catch.
               - "Android versions tested" is now OPTIONAL on the form. Only
                 treat it as a gap when it actually matters: if the platform is
                 Android, Kotlin, or React Native and no Android version is
                 given, ask for it (`needs_more_info`). For a purely web /
                 build-time / TypeScript issue, a blank Android-versions field is
                 fine — do not penalize it.
               - "Wallets tested" is still required and matters for EVERY
                 platform (App -> Wallet). A web/RN report that named no wallet,
                 or only the Mock wallet, has not actually exercised the
                 app-to-wallet path — treat that as inadequate (`needs_more_info`
                 or `needs_test_app_repro`).

            ## Decide ONE verdict (enum)
            ready_for_engineering | needs_more_info | needs_test_app_repro |
            wrong_repo_first_party | wrong_repo_third_party |
            fixed_in_later_version | not_a_bug | spam_or_off_topic

            `not_a_bug` is for a legitimate report that simply isn't an SDK bug:
            a usage/how-to QUESTION, or a FEATURE REQUEST. Do NOT use
            `spam_or_off_topic` for these — reserve that for actual spam or
            off-topic noise.

            Reason through the full schema internally before deciding
            (product_classification, repro_context, template_completeness{
            sdk_version_provided, android_versions_provided,
            repro_steps_adequate, lazy_sections[] }, version_check{
            reported_version, latest_version, status, fix_citation }, verdict,
            comment_body). Your OUTPUT is the GitHub actions below, not JSON.

            ## Actions per verdict
            Label taxonomy: the form applies `needs-triage`. Your job is to
            REMOVE `needs-triage` and move the issue into exactly one state.
            First ensure every label you use exists (idempotent):
            `gh label create "<name>" --color <hex> --description "<desc>" --force`

            ALSO, whenever the platform is identifiable (i.e. not "Not sure /
            other"), add the matching platform label so engineering can route:
            `platform: android`, `platform: kotlin`, `platform: javascript`, or
            `platform: react-native`. Add it regardless of verdict (including on
            issues you leave open) — it is orthogonal to the state label below.

            - ready_for_engineering: remove `needs-triage`, add
              `ready-for-engineering`. Post a short confirming comment. Leave
              open. (No grace period.)
            - needs_more_info: remove `needs-triage`, add `needs-info`. Comment
              pointing at the SPECIFIC missing/inadequate field(s). Leave open.
              (7-day grace via the nightly sweep.)
            - needs_test_app_repro: remove `needs-triage`, add
              `needs-test-app-repro`. Comment asking for an example/test-app
              repro, naming what's missing. Leave open. (7-day grace.)
            - wrong_repo_first_party: post the redirect comment, then close
              (`gh issue close ${{ github.event.issue.number }} --reason "not planned"`).
              No label. (Immediate — wrong venue.)
            - wrong_repo_third_party: post the redirect comment, then close
              `--reason "not planned"`. No label. (Immediate.)
            - fixed_in_later_version: post the upgrade comment citing the real
              changelog line, then close `--reason "not planned"`. No label.
              (Immediate — resolved evidence; reporter can reopen.)
            - not_a_bug: decide which kind it is:
                * Usage / how-to QUESTION: add the existing `question` label and
                  do NOT post your own comment or close it. A separate automation
                  (.github/workflows/label-actions.yml) already redirects
                  `question` issues to the Solana Stack Exchange and closes them —
                  let it handle the reply so we don't double-comment.
                * FEATURE REQUEST / enhancement: remove `needs-triage`, add
                  `enhancement`, post a short comment acknowledging it's tracked
                  as a feature request (not a bug), and leave it OPEN for
                  maintainer triage (no grace period — not waiting on reporter).
            - spam_or_off_topic: close `--reason "not planned"` with a brief
              neutral comment. No label.

            ## Comment templates (draft a SPECIFIC per-issue version — never
            paste boilerplate; fill every [bracket] with real values)
            - wrong_repo_first_party: "Thanks for the report! This sounds like
              it's happening in [App Name] — for support with the app itself,
              head to our Discord: [link]. If you're able to reproduce this with
              our SDK directly or the example app in this repo, please reopen
              with those steps — that would tell us it's actually an SDK-level
              bug."
            - wrong_repo_third_party: "Thanks for the report. Since this is
              happening in [App Name], which isn't something we maintain, we're
              not able to act on it directly here — reproduction there could be
              caused by that app's own integration code. If you can reproduce
              this using the example app in this repo (or a minimal SDK
              integration), please reopen with those steps and we'll take a
              look."
            - fixed_in_later_version: "This looks like it was fixed in v[X]:
              \"[quoted changelog line]\" ([link]). Could you upgrade to the
              latest (v[latest]) and reopen if you're still seeing this?"
            - needs_more_info / needs_test_app_repro: draft per-issue, naming the
              specific gap — e.g. "You listed Android 13 but didn't say which
              example app or version you tested with for the reproducibility
              question."
            - not_a_bug (feature request): "Thanks for the suggestion! This is a
              feature request rather than a bug, so I've labelled it
              `enhancement` and left it open for the maintainers to consider.
              [one sentence restating the request in your own words]." (For the
              question sub-case, post NO comment — the `question` label
              automation handles the reply.)

            ## Idempotency & the required marker (do this exactly)
            EVERY comment you post MUST end with the hidden marker on its own
            line:  <!-- claude-triage-verdict: <verdict> -->
            (using the verdict enum value). The nightly sweep and your own
            re-checks find your prior comment by this marker.

            Before commenting, look for a prior verdict comment:
              `gh api "repos/${GH_REPO}/issues/${{ github.event.issue.number }}/comments" --jq '[.[]|select(.body|contains("claude-triage-verdict"))]|last|.id'`
            - If an id is returned, UPDATE that comment in place (write the new
              body to a file and
              `gh api --method PATCH "repos/${GH_REPO}/issues/comments/<id>" -F body=@<file>`)
              instead of posting a new one, and reconcile labels to the new
              verdict.
            - If none exists, post a new comment
              (`gh issue comment ${{ github.event.issue.number }} --body-file <file>`).

            Do not reopen a closed issue. Take no destructive action you are not
            certain of; when in doubt, prefer needs_more_info.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 20
            --allowedTools "Read,Grep,Glob,Write,Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue close:*),Bash(gh issue comment:*),Bash(gh label:*),Bash(gh api:*),Bash(gh release list:*),Bash(gh release view:*),Bash(git log:*),Bash(git tag:*),Bash(git grep:*)"
