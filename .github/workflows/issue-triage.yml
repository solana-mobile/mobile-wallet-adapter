name: Issue Triage

# LLM-driven issue triage built on anthropics/claude-code-action.
#
# Runs automatically on new bug reports and on reporter edits. It classifies
# product source (SDK vs wrong-repo / first-party / third-party), repro quality,
# and template completeness, then branches on ONE verdict: a label + a
# "please update this issue" comment for waiting-on-reporter states, or an
# immediate closing comment for wrong-repo / spam / not-a-bug cases.
#
# Reprocessing is bounded so it can't burn tokens in a loop: a reporter gets ONE
# follow-up. If they edit an issue we asked them to complete and it is STILL
# inadequate, it is closed. If they never respond, the nightly sweep
# (issue-triage-stale-sweep.yml) closes it after 7 days.
#
# Nothing runs on the existing backlog automatically: triage only acts on new
# events, and old issues lack the gating labels so even edits won't trigger them.
# Maintainers (org members/collaborators) can force a run on ANY open issue —
# including backlog issues — by commenting `@claude re-triage`. Plain comments
# from reporters/third parties never trigger a run, and close/reopen does not
# either (only `opened`/`edited` are watched).
#
# State = GitHub labels + a hidden marker (<!-- claude-triage-verdict: ... -->)
# in the bot's own comment. No database. This job never reads repo files and
# never opens PRs — it only labels/comments/closes issues.
#
# One-time maintainer setup:
#   - Add the `ANTHROPIC_API_KEY` repository secret (or swap the auth input for
#     the Claude GitHub App's CLAUDE_CODE_OAUTH_TOKEN).
#   - Run the "Issue Triage Labels Bootstrap" workflow once.

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

# One triage run per issue at a time; a newer event supersedes an in-flight one
# so we never double-comment from a near-simultaneous edit + comment.
concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    # Hard wall-clock cap so a stuck run can't burn a runner (or tokens) forever.
    timeout-minutes: 10

    # Cost gate: a Claude run is expensive the instant it launches, so we decide
    # here — NOT inside the prompt — whether it's worth launching at all. Only
    # OPEN, non-PR issues, and only in these cases:
    #   - a newly OPENED bug (has needs-triage; the feature/question intake paths
    #     don't apply that label, so they never launch a triage run);
    #   - an EDIT to an issue still in a triage/awaiting-reporter state (this is
    #     the reporter's one follow-up);
    #   - a maintainer (org OWNER/MEMBER/COLLABORATOR) commenting
    #     `@claude re-triage`. Reporter/third-party/bot comments never trigger.
    if: >
      github.event.issue.state == 'open' &&
      !github.event.issue.pull_request &&
      (
        (github.event_name == 'issues' && github.event.action == 'opened' &&
         contains(github.event.issue.labels.*.name, 'needs-triage'))
        ||
        (github.event_name == 'issues' && github.event.action == 'edited' &&
         (contains(github.event.issue.labels.*.name, 'needs-triage') ||
          contains(github.event.issue.labels.*.name, 'needs-info') ||
          contains(github.event.issue.labels.*.name, 'needs-test-app-repro')))
        ||
        (github.event_name == 'issue_comment' &&
         contains(github.event.comment.body, '@claude re-triage') &&
         (github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'))
      )

    steps:
      # No checkout: triage no longer reads repo files.
      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are the issue-triage bot for the `${{ github.repository }}`
            repository, the home of the Solana Mobile Wallet Adapter (MWA) SDK.
            This run was triggered by event `${{ github.event_name }}`, action
            `${{ github.event.action }}`, on issue
            #${{ github.event.issue.number }}. Do ONE classification pass and
            take exactly the follow-up actions your verdict calls for. Be
            conservative: a wrong "please clarify" costs one comment, but a wrong
            redirect-and-close throws away a real bug report.

            ## Gather context first
            - Read the full issue and every comment:
              `gh issue view ${{ github.event.issue.number }} --json title,body,author,labels,state,comments`
            - Check existing labels FIRST. The repo has separate intake
              templates: bugs arrive labelled `needs-triage`; feature requests
              arrive labelled `enhancement` (via feature_request.yml). If the
              issue already carries `enhancement` (or `question`), it was NOT
              filed as a bug — do not demand bug-report fields. Treat it as
              `not_a_bug`, make sure the right label is present, and only add a
              brief comment if there is no prior verdict comment yet; otherwise
              take no action.
            - Full bug triage applies to bug reports: any issue in the
              `needs-triage` intake, AND any issue a maintainer explicitly asked
              you to re-triage with `@claude re-triage` — including OLD backlog
              issues filed via a previous template that have no `needs-*` label
              at all. In that manual case, do a full fresh triage as if the issue
              were newly filed; a missing `needs-triage` label is expected, not a
              reason to skip.
            - The reporter filled out a structured Bug report form
              (.github/ISSUE_TEMPLATE/bug_report.yml) with these fields:
              description of the bug, affected SDK/platform, SDK version, a
              "reproduced on latest version" checkbox, dependency versions,
              wallets tested (at least Mock MWA + 1 other is required — MWA is
              always app-to-wallet, so even web/RN reports must name a wallet),
              "Is this reproducible using our example/test app?", steps to
              reproduce with the example app, expected vs actual behavior, and
              optional Android versions tested, screenshots, device details,
              logs, and additional context.

            ## Reprocessing policy (bounded — important)
            - First time you find a bug report inadequate (issue is in
              `needs-triage`): apply the right needs-* label and clearly ask the
              reporter to EDIT/UPDATE THIS ISSUE with the missing info — NOT to
              comment, NOT to reopen, NOT to open a new issue. Editing is what
              re-runs this check.
            - If this run was triggered by an ISSUE EDIT and the issue ALREADY
              carries `needs-info` or `needs-test-app-repro` (you already asked
              once):
                * now adequate -> proceed to the correct verdict.
                * still inadequate -> CLOSE it
                  (`gh issue close ${{ github.event.issue.number }} --reason "not planned"`)
                  with a comment explaining they had one follow-up and it's still
                  missing [X], and inviting them to open a fresh issue with the
                  details. This is the ONLY case where this bot closes an
                  incomplete bug directly.
            - If this run is a maintainer `@claude re-triage` comment: do a full
              fresh triage (this is how backlog issues get processed on demand),
              but NEVER auto-close for incompleteness here — a human is in the
              loop; just set the right label/verdict and comment. (Closing for
              wrong-repo / spam / not_a_bug is still fine.)

            ## Multi-platform monorepo — anchor on the platform
            The affected SDK/platform field selects the relevant library and
            example app. Platforms: Android native/Java (Maven
            `com.solanamobile:mobile-wallet-adapter-clientlib` / `-walletlib`),
            Android Kotlin (`-clientlib-ktx`), Web and React Native (the
            `@solana-mobile/*` npm packages under js/packages/*).
            Example/test apps by platform (use these to judge repro adequacy):
            Android (Java/Kotlin) -> android/fakedapp, android/fakewallet,
            examples/example-clientlib-ktx-app; React Native ->
            examples/example-react-native-app, examples/example-react-native-wallet;
            Web -> examples/example-web-app. A repro naming an example app from a
            DIFFERENT platform than the reported one is a red flag worth a
            clarifying question.

            ## KNOWN FIRST-PARTY PRODUCTS (out of scope for this repo)
            Treat this block as ground truth — Solana-Mobile-owned apps, NOT this
            SDK; issues about the app itself belong in our support channels.
            <<<
            - "Seed Vault Wallet" — Solana Mobile's own wallet app, preinstalled
              and available ONLY on the Seeker phone (not on the Play Store or
              any other device). Support channel: our Discord,
              https://discord.gg/solanamobile.
            >>>
            IMPORTANT nuance — Seed Vault Wallet also appears as a choice in the
            form's "wallets tested" field, and that is legitimate: a reporter may
            use it as the *counterparty wallet* while reproducing a genuine SDK
            bug from a dApp/example app. Only treat it as `wrong_repo_first_party`
            when the issue is ABOUT Seed Vault Wallet the app itself — its UI,
            on-device behavior, "the wallet won't open/approve/sign", account/seed
            management, Seeker-specific behavior — with no SDK-level or
            example-app repro. When it's merely the test wallet for an SDK-side
            bug, keep triaging it as an SDK issue.

            ## Classification order (follow strictly)

            1. PRODUCT SOURCE first. Decide whether the reporter is a developer
               integrating the SDK (they show integration code, wallet-adapter
               APIs, stack traces through MWA packages) or an end user of some
               app with no code visibility.
               - MWA is ALWAYS an app-to-wallet flow (dApp -> wallet). A common
                 mis-report is a web/React Native dApp team blaming the SDK for
                 what is really the WALLET's behavior. Separate the two: is the
                 fault in the SDK/protocol layer (association, encoding, the
                 client/wallet libraries in this repo) or in how a specific
                 wallet app handled the request? If it's wallet-side and the
                 wallet is Seed Vault Wallet -> `wrong_repo_first_party`; if it's
                 a third-party wallet (Phantom, Solflare, Backpack, etc.) with no
                 example/test-app repro -> `wrong_repo_third_party`.
               - Route to `wrong_repo_*` ONLY when there is no independent
                 example/test-app repro AND the reporter has no visibility into
                 SDK-level behavior.
               - When signals are mixed, choose ambiguous and ask for
                 clarification (`needs_more_info`) rather than redirecting.

            2. TEMPLATE COMPLETENESS / REPRO QUALITY — only if not routed away
               above. "Adequate" repro means SPECIFIC: it names an example app, a
               version, and numbered steps. Restating the bug or generic filler
               ("N/A", "yes", "just run it") is NOT adequate. The form cannot
               conditionally require fields, so someone who answered "No - only
               seen in my own app" was still forced to type something into the
               repro-steps box — filler there is exactly what to catch.
               - "Android versions tested" is OPTIONAL on the form. Only treat it
                 as a gap when it matters: if the platform is Android, Kotlin, or
                 React Native and no Android version is given, ask for it. For a
                 purely web / build-time / TypeScript issue, a blank
                 Android-versions field is fine.
               - "Wallets tested" is required and matters for EVERY platform
                 (App -> Wallet). A web/RN report that named no wallet, or only
                 the Mock wallet, has not exercised the app-to-wallet path —
                 treat as inadequate.
               - The "reproduced on latest version" checkbox is a nudge, not a
                 gate. If it's UNCHECKED, it's reasonable to ask them (as part of
                 a needs_more_info) to confirm the bug still happens on the latest
                 release and to update the issue. Do NOT try to determine whether
                 the bug was fixed in a later version yourself — we do not do
                 version-staleness analysis.

            ## Decide ONE verdict (enum)
            ready_for_engineering | needs_more_info | needs_test_app_repro |
            wrong_repo_first_party | wrong_repo_third_party | not_a_bug |
            spam_or_off_topic

            `not_a_bug` = a legitimate report that isn't an SDK bug: a usage/how-to
            QUESTION or a FEATURE REQUEST. Do NOT use `spam_or_off_topic` for
            these — reserve that for actual spam / off-topic noise.

            ## Actions per verdict
            The form applies `needs-triage`; your job is to remove it (only if
            present — backlog issues may not have it) and move the issue into
            exactly one state. Ensure each label exists first (idempotent):
            `gh label create "<name>" --color <hex> --description "<desc>" --force`.
            Whenever the platform is identifiable (not "Not sure / other"), ALSO
            add the routing label `platform: android`, `platform: kotlin`,
            `platform: javascript`, or `platform: react-native` — orthogonal to
            the state label, add it on any verdict including ones you leave open.

            - ready_for_engineering: remove `needs-triage`, add
              `ready-for-engineering`, short confirming comment, leave open.
            - needs_more_info: remove `needs-triage`, add `needs-info`. Comment
              naming the SPECIFIC missing/inadequate field(s) and asking them to
              EDIT this issue to add them. Leave open. (One follow-up, then the
              policy above; 7-day sweep if no response.)
            - needs_test_app_repro: remove `needs-triage`, add
              `needs-test-app-repro`. Comment asking them to EDIT this issue with
              an example/test-app repro, naming what's missing. Leave open.
            - wrong_repo_first_party: post the redirect comment, then close
              `--reason "not planned"`. No label.
            - wrong_repo_third_party: post the redirect comment, then close
              `--reason "not planned"`. No label.
            - not_a_bug: decide which kind:
                * QUESTION: add the `question` label and do NOT post your own
                  comment or close it — a separate automation
                  (.github/workflows/label-actions.yml) already redirects
                  `question` issues to the Solana Stack Exchange and closes them.
                * FEATURE REQUEST: remove `needs-triage`, add `enhancement`, post
                  a short "tracked as a feature request" comment, leave OPEN.
            - spam_or_off_topic: close `--reason "not planned"` with a brief
              neutral comment. No label.

            ## Comment templates (draft a SPECIFIC per-issue version — never paste
            boilerplate; fill every [bracket] with real values)
            - needs_more_info / needs_test_app_repro: draft per-issue, name the
              exact gap, and ALWAYS tell them how to fix it: "Please EDIT this
              issue (don't reply in a comment or open a new one) to add [X] — it
              will be re-checked automatically once you update it." e.g. "You
              listed Android 13 but didn't say which example app or version you
              tested for the reproducibility question — please edit the issue to
              add that."
            - second-strike close (edited but still inadequate): "Thanks for the
              update, but the report is still missing [X], so I'm closing this per
              our one-follow-up policy. If you can gather [X], please open a fresh
              issue with those details and we'll take a look."
            - wrong_repo_first_party: "Thanks for the report! This sounds like
              it's happening in [App Name] — for help with the app itself, head to
              our Discord: [link]. If you can reproduce it with our SDK directly or
              the example app in this repo, open a new issue with those steps —
              that would tell us it's an SDK-level bug."
            - wrong_repo_third_party: "Thanks for the report. Since this is
              happening in [App Name], which we don't maintain, we can't act on it
              here — it could be caused by that app's own integration code. If you
              can reproduce it using the example app in this repo (or a minimal
              SDK integration), open a new issue with those steps and we'll take a
              look."
            - not_a_bug (feature request): "Thanks for the suggestion! This is a
              feature request rather than a bug, so I've labelled it `enhancement`
              and left it open for the maintainers to consider. [one sentence
              restating the request]." (For the question sub-case, post NO comment
              — the `question` label automation replies.)

            ## Idempotency & the required marker (do this exactly)
            EVERY comment you post MUST end with the hidden marker on its own line:
              <!-- claude-triage-verdict: <verdict> -->
            (using the verdict enum value). The nightly sweep and your own
            re-checks find your prior comment by this marker.

            Before commenting, look for a prior verdict comment:
              `gh api "repos/${GH_REPO}/issues/${{ github.event.issue.number }}/comments" --jq '[.[]|select(.body|contains("claude-triage-verdict"))]|last|.id'`
            - If an id is returned, UPDATE that comment in place (write the new
              body to a file and
              `gh api --method PATCH "repos/${GH_REPO}/issues/comments/<id>" -F body=@<file>`)
              rather than posting a new one, and reconcile labels to the new
              verdict.
            - If none exists, post a new comment
              (`gh issue comment ${{ github.event.issue.number }} --body-file <file>`).

            Do not reopen a closed issue. When in doubt, prefer needs_more_info
            over any close.
          # Cheapest tier for the always-on job: Sonnet + low effort. Turn UP by
          # raising --effort (low -> medium) if classification quality slips.
          claude_args: |
            --model claude-sonnet-5
            --effort low
            --max-turns 20
            --allowedTools "Write,Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue close:*),Bash(gh issue comment:*),Bash(gh label:*),Bash(gh api:*)"
