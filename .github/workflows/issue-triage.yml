name: Issue Triage

# LLM-driven triage built on anthropics/claude-code-action.
#
# One combined classification pass runs on issue open/edit and on new
# (non-bot) comments. It classifies product source, repro quality, template
# completeness and version staleness, then branches on a single verdict:
# labels + a grace-period comment for "waiting on reporter" states, or an
# immediate closing comment for wrong-repo / spam / version-fixed cases.
#
# State lives entirely in GitHub labels + a hidden HTML marker
# (<!-- claude-triage-verdict: ... -->) in the bot's own comment. No database.
# The deterministic nightly job in issue-triage-stale-sweep.yml uses that same
# marker to auto-close stale "waiting on reporter" issues after 7 days.
#
# Setup required by a maintainer (one time):
#   - Add the `ANTHROPIC_API_KEY` repository secret (or swap the auth input
#     below for the Claude GitHub App's CLAUDE_CODE_OAUTH_TOKEN).
#   - Fill in the KNOWN FIRST-PARTY PRODUCTS block in the prompt (app name,
#     package, support link) — see the TODO markers there.

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

# One triage run per issue at a time; a newer event supersedes an in-flight one
# so we never double-comment from a near-simultaneous edit + comment.
concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest

    # Only triage OPEN, non-PR issues. Skip comments authored by any bot
    # (including this bot's own verdict/reminder comments) so we never loop.
    if: >
      (github.event_name == 'issues' && github.event.issue.state == 'open') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.state == 'open' &&
       !github.event.issue.pull_request &&
       github.event.comment.user.type != 'Bot')

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are the issue-triage bot for the `${{ github.repository }}`
            repository, the home of the Solana Mobile Wallet Adapter (MWA) SDK.
            You have been triggered by a `${{ github.event_name }}` event on
            issue #${{ github.event.issue.number }}. Do ONE combined
            classification pass and take exactly the follow-up actions your
            verdict calls for. Be conservative: a wrong "please clarify" costs
            one comment, but a wrong redirect-and-close throws away a real bug
            report.

            ## Gather context first
            - Read the full issue and every comment:
              `gh issue view ${{ github.event.issue.number }} --json title,body,author,labels,state,comments`
            - The reporter filled out a structured Bug report form
              (.github/ISSUE_TEMPLATE/bug_report.yml) with these fields: SDK
              version, Android versions tested, "Is this reproducible using our
              example/test app?", steps to reproduce with the example app,
              expected vs actual behavior, and optional logs.

            ## KNOWN FIRST-PARTY PRODUCTS (out of scope for this repo)
            Treat this block as ground truth — you cannot infer it, because
            these apps are private. A maintainer must fill in the real values;
            until then, DO NOT emit a `wrong_repo_first_party` verdict — fall
            back to `ambiguous` -> `needs_more_info` instead.
            <<<
            # TODO(maintainer): replace the placeholders below.
            - "[App Name]" — package com.yourcompany.app — support: https://discord.gg/yourinvite
            >>>

            ## Classification order (follow strictly)

            1. PRODUCT SOURCE first. Decide whether the reporter is a developer
               integrating the SDK (they show integration code, e.g. calling
               `SdkClient.connect()`, wallet-adapter APIs, stack traces through
               MWA packages) or an end user of some app with no code visibility.
               - Route to `wrong_repo_first_party` / `wrong_repo_third_party`
                 ONLY when there is no independent example/test-app repro AND the
                 reporter has no visibility into SDK-level behavior.
               - When signals are mixed, choose `ambiguous` and ask for
                 clarification (`needs_more_info`) rather than redirecting.

            2. VERSION STALENESS — only for a genuine `sdk_issue`. Compare the
               reported SDK version against the latest using REAL semver
               ordering (1.10.0 > 1.9.0 — never string-sort). The MWA JS
               packages keep Changesets changelogs at
               js/packages/*/CHANGELOG.md (format: `## X.Y.Z` headers with
               commit-hash-prefixed bullet lines); the latest released version
               is the top `## X.Y.Z` header in the relevant package. Use
               `Read`/`Grep` on those files (and `git log` for Android, which has
               no changelog).
               - `behind_fix_confirmed` requires an ACTUAL quotable changelog
                 line or commit that plausibly matches the reported bug. Never
                 fabricate or guess a citation. If the reported version is behind
                 but you cannot find a matching fix, that is
                 `behind_no_match_found` — do NOT emit `fixed_in_later_version`.

            3. TEMPLATE COMPLETENESS / REPRO QUALITY — only if not already
               routed away above. "Adequate" repro means SPECIFIC: it names an
               example app, a version, and numbered steps. Restating the bug or
               generic filler ("N/A", "yes", "just run it") is NOT adequate.
               Note the form cannot conditionally require fields, so someone who
               answered "No - only seen in my own app" was still forced to type
               something into the repro-steps box — filler there is exactly what
               you must catch.

            ## Decide ONE verdict (enum)
            ready_for_engineering | needs_more_info | needs_test_app_repro |
            wrong_repo_first_party | wrong_repo_third_party |
            fixed_in_later_version | spam_or_off_topic

            Reason through the full schema internally before deciding
            (product_classification, repro_context, template_completeness{
            sdk_version_provided, android_versions_provided,
            repro_steps_adequate, lazy_sections[] }, version_check{
            reported_version, latest_version, status, fix_citation }, verdict,
            comment_body). Your OUTPUT is the GitHub actions below, not JSON.

            ## Actions per verdict
            Label taxonomy: the form applies `needs-triage`. Your job is to
            REMOVE `needs-triage` and move the issue into exactly one state.
            First ensure every label you use exists (idempotent):
            `gh label create "<name>" --color <hex> --description "<desc>" --force`

            - ready_for_engineering: remove `needs-triage`, add
              `ready-for-engineering`. Post a short confirming comment. Leave
              open. (No grace period.)
            - needs_more_info: remove `needs-triage`, add `needs-info`. Comment
              pointing at the SPECIFIC missing/inadequate field(s). Leave open.
              (7-day grace via the nightly sweep.)
            - needs_test_app_repro: remove `needs-triage`, add
              `needs-test-app-repro`. Comment asking for an example/test-app
              repro, naming what's missing. Leave open. (7-day grace.)
            - wrong_repo_first_party: post the redirect comment, then close
              (`gh issue close ${{ github.event.issue.number }} --reason "not planned"`).
              No label. (Immediate — wrong venue.)
            - wrong_repo_third_party: post the redirect comment, then close
              `--reason "not planned"`. No label. (Immediate.)
            - fixed_in_later_version: post the upgrade comment citing the real
              changelog line, then close `--reason "not planned"`. No label.
              (Immediate — resolved evidence; reporter can reopen.)
            - spam_or_off_topic: close `--reason "not planned"` with a brief
              neutral comment. No label.

            ## Comment templates (draft a SPECIFIC per-issue version — never
            paste boilerplate; fill every [bracket] with real values)
            - wrong_repo_first_party: "Thanks for the report! This sounds like
              it's happening in [App Name] — for support with the app itself,
              head to our Discord: [link]. If you're able to reproduce this with
              our SDK directly or the example app in this repo, please reopen
              with those steps — that would tell us it's actually an SDK-level
              bug."
            - wrong_repo_third_party: "Thanks for the report. Since this is
              happening in [App Name], which isn't something we maintain, we're
              not able to act on it directly here — reproduction there could be
              caused by that app's own integration code. If you can reproduce
              this using the example app in this repo (or a minimal SDK
              integration), please reopen with those steps and we'll take a
              look."
            - fixed_in_later_version: "This looks like it was fixed in v[X]:
              \"[quoted changelog line]\" ([link]). Could you upgrade to the
              latest (v[latest]) and reopen if you're still seeing this?"
            - needs_more_info / needs_test_app_repro: draft per-issue, naming the
              specific gap — e.g. "You listed Android 13 but didn't say which
              example app or version you tested with for the reproducibility
              question."

            ## Idempotency & the required marker (do this exactly)
            EVERY comment you post MUST end with the hidden marker on its own
            line:  <!-- claude-triage-verdict: <verdict> -->
            (using the verdict enum value). The nightly sweep and your own
            re-checks find your prior comment by this marker.

            Before commenting, look for a prior verdict comment:
              `gh api "repos/${GH_REPO}/issues/${{ github.event.issue.number }}/comments" --jq '[.[]|select(.body|contains("claude-triage-verdict"))]|last|.id'`
            - If an id is returned, UPDATE that comment in place (write the new
              body to a file and
              `gh api --method PATCH "repos/${GH_REPO}/issues/comments/<id>" -F body=@<file>`)
              instead of posting a new one, and reconcile labels to the new
              verdict.
            - If none exists, post a new comment
              (`gh issue comment ${{ github.event.issue.number }} --body-file <file>`).

            Do not reopen a closed issue. Take no destructive action you are not
            certain of; when in doubt, prefer needs_more_info.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 30
            --allowedTools "Read,Grep,Glob,Write,Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue close:*),Bash(gh issue comment:*),Bash(gh label:*),Bash(gh api:*),Bash(git log:*),Bash(git grep:*)"
