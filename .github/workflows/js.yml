name: JavaScript Pre-Publish

on:
  push:
    branches: [ main ]
    paths: [ '.github/**', 'js/**' ]
  pull_request:
    branches: [ main ]
    paths: [ '.github/**', 'js/**' ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          cache: true
          cache_dependency_path: 'js/pnpm-lock.yaml'
          package_json_file: 'js/package.json'

      - name: '[js] Install dependencies'
        working-directory: 'js/'
        run: pnpm install --frozen-lockfile
      - name: '[js] Lint'
        working-directory: 'js/'
        run: pnpm lint:check
      - name: '[js] Changeset Check'
        working-directory: 'js/'
        run: pnpm changeset:check
      - name: '[js] Format Check'
        working-directory: 'js/'
        run: pnpm format:check
      - name: '[js] Check Types'
        working-directory: 'js/'
        run: pnpm check-types

      - name: '[js] Build'
        working-directory: 'js/'
        run: pnpm build

      - name: '[js] Test'
        working-directory: 'js/'
        run: pnpm test --run

      - name: '[mobile-wallet-adapter-protocol] Pre-Publish'
        working-directory: 'js/packages/mobile-wallet-adapter-protocol'
        run: pnpm prepublishOnly

      - name: '[mobile-wallet-adapter-protocol-web3js] Pre-Publish'
        working-directory: 'js/packages/mobile-wallet-adapter-protocol-web3js'
        run: pnpm prepublishOnly

      - name: '[wallet-adapter-mobile] Pre-Publish'
        working-directory: 'js/packages/wallet-adapter-mobile'
        run: pnpm prepublishOnly
